databaseChangeLog:
  - changeSet:
      id: 1
      author: domino
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: registration_date
                  type: TIMESTAMP
              - column:
                  name: total_tickets
                  type: INT
              - column:
                  name: total_spent
                  type: DECIMAL(10, 2)
              - column:
                  name: total_winnings
                  type: DECIMAL(10, 2)
              - column:
                  name: net_profit
                  type: DECIMAL(10, 2)
