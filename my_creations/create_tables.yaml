databaseChangeLog:
  - changeSet:
      id: 001
      author: your_name
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: registration_date
                  type: TIMESTAMP
        - createTable:
            tableName: games
            columns:
              - column:
                  name: game_id
                  type: INT
                  constraints:
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: game_name
                  type: VARCHAR(100)
              - column:
                  name: game_type
                  type: VARCHAR(50)
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: ticket_id
                  type: INT
                  constraints:
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: user_id
                  type: INT
                  constraints:
                    foreignKeyName: fk_tickets_users
                    references: users(user_id)
              - column:
                  name: game_id
                  type: INT
                  constraints:
                    foreignKeyName: fk_tickets_games
                    references: games(game_id)
              - column:
                  name: purchase_date
                  type: TIMESTAMP
        - createTable:
            tableName: winnings
            columns:
              - column:
                  name: win_id
                  type: INT
                  constraints:
                    primaryKey: true
                    autoIncrement: true
              - column:
                  name: ticket_id
                  type: INT
                  constraints:
                    foreignKeyName: fk_winnings_tickets
                    references: tickets(ticket_id)
              - column:
                  name: win_amount
                  type: DECIMAL(10,2)
              - column:
                  name: win_category
                  type: VARCHAR(20)
              - column:
                  name: win_date
                  type: TIMESTAMP
